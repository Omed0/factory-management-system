name: Release (build + push image)

# Required repo secrets  (Settings -> Secrets and variables -> Actions -> Secrets):
#   VITE_SUPABASE_URL        -- public Kong URL baked into the browser bundle, e.g. https://api.your-domain.com
#   VITE_SUPABASE_ANON_KEY   -- Supabase anon key baked into the browser bundle (same value as ANON_KEY)
#   CLOUDFLARE_API_TOKEN     -- Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID    -- your Cloudflare account ID
#
# Required repo variable  (Settings -> Secrets and variables -> Actions -> Variables):
#   DEPLOY_CLOUDFLARE        -- set to "true" to auto-deploy to Workers on every tag

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tag
        id: tag
        run: echo "ref=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.ref }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cloudflare:
    needs: image
    runs-on: ubuntu-latest
    # Enable by setting repo variable DEPLOY_CLOUDFLARE=true
    if: vars.DEPLOY_CLOUDFLARE == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: DEPLOY_TARGET=cloudflare bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config deploy/cloudflare/wrangler.toml
